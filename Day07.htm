/*********************************How to custom load a function********************************************
// define a MACRO for building a function like for 
// HRESULT getWindowName(DWORD x, HWND y)
#define GET_WINDOW_NAME(name) HRESULT name(DWORD x, HWND y)

// Now create a pointer so that we can use the function
typedef GET_WINDOW_NAME(get_window_name);

// Create a stub function
GET_WINDOW_NAME(getWindowNameStub)
{
	return 0;
}

// create a global variable so we can access it 
global get_window_name *getWindowName_ = getWindowNameStub;

// use the original name
#define getWindowName getWindowName_

// Load the library
HMODULE windowHandlingLibrary = LoadLibraryA("windowHandling_v2.dll");
if(windowHandlingLibrary)
{
	// if windowHandling_v2 is not available then use v1.
	HMODULE windowHandlingLibrary = LoadLibraryA("windowHandling_v1.dll");
}
if(windowHandlingLibrary)
{
	getWindowName = (*get_window_name)GetProcAddress(windowHandlingLibrary, 
			"getWindowName");
	if(!getWindowName) getWindowName = getWindowNameStub;
}
/*********************************How to custom load a function********************************************
